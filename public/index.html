<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Backrooms Pro Ergonomic Controller</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #000; font-family: monospace; user-select: none; -webkit-user-select: none; touch-action: none; }
        
        #game-container { width: 100%; height: 100%; position: relative; display: flex; box-sizing: border-box; touch-action: none; }
        #touch-zone-left { width: 45%; height: 100%; position: relative; z-index: 1; touch-action: none; }
        #touch-zone-right { width: 55%; height: 100%; position: relative; z-index: 1; touch-action: none; }

        #overlay-log { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); color: #0f0; font-size: 11px; z-index: 10; text-align: center; pointer-events: none; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 4px; }
        #sys-menu { position: absolute; top: 12px; left: 12px; z-index: 20; }
        .sys-btn { background: #111; border: 1px solid #0f0; color: #0f0; padding: 6px 12px; font-weight: bold; border-radius: 4px; }

        /* アクションボタン：親指の回転軌道（扇形）に沿って完全再配置 */
        .btn { 
            position: absolute; 
            background: rgba(55, 55, 55, 0.6); 
            border: 2px solid rgba(255,255,255,0.4); 
            color: #fff; 
            border-radius: 50%; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 5; 
            text-align: center;
            touch-action: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        .btn.active-press { background: rgba(0, 255, 0, 0.6) !important; border-color: #0f0 !important; color: #0f0; }
        .btn.keep-active { background: rgba(255, 140, 0, 0.7) !important; border-color: #ff8c00 !important; }
        .edit-mode { border: 2px dashed #ff00ff !important; background: rgba(255, 0, 255, 0.2) !important; }

        /* アイテムスロット（左下、移動の邪魔にならない絶妙な位置に配置） */
        .slot-container { position: absolute; bottom: 15px; left: 22vw; display: flex; gap: 8px; z-index: 5; }
        .slot-btn { width: 44px; height: 44px; background: rgba(40,40,40,0.7); border: 2px solid rgba(255,255,255,0.4); color: #fff; font-size: 16px; border-radius: 8px; touch-action: none; }
        .slot-btn:active { border-color: #0f0; color: #0f0; }

        /* --- 51音携帯型フリック風トグルキーボード UI --- */
        #custom-keyboard-overlay { display: none; position: absolute; bottom: 0; left: 0; width: 100vw; height: 50vh; background: rgba(15, 15, 15, 0.98); border-top: 3px solid #0f0; z-index: 100; box-sizing: border-box; padding: 10px; flex-direction: column; gap: 8px; touch-action: none; }
        #kb-input-line { display: flex; width: 100%; height: 45px; gap: 10px; }
        #kb-preview { flex: 1; background: #000; border: 1px solid #0f0; color: #0f0; padding: 0 12px; font-size: 18px; line-height: 45px; border-radius: 4px; overflow: hidden; white-space: nowrap; }
        .kb-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; flex: 1; width: 100%; max-width: 600px; margin: 0 auto; }
        .kb-key { background: #252525; border: 1px solid #555; color: #fff; border-radius: 6px; font-size: 16px; display: flex; align-items: center; justify-content: center; font-weight: bold; min-height: 50px; }
        .kb-key:active { background: #0f0; color: #000; }
        .kb-key.sys-key { background: #444; color: #0f0; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="overlay-log">[SYSTEM] Ergonomic Arc Layout Loaded. Ready.</div>
    
    <div id="sys-menu">
        <button class="sys-btn" id="mode-toggle" onclick="toggleEditMode()">EDIT</button>
    </div>
    
    <div id="touch-zone-left">
        <div class="btn" id="btn-shift" style="bottom: 18vh; left: 3vw; width: 65px; height: 65px; font-size: 13px;">走る<br>Shift</div>
        <div class="btn" id="btn-ctrl" style="bottom: 4vh; left: 3vw; width: 65px; height: 65px; font-size: 13px;">屈む<br>Ctrl</div>
    </div>
    
    <div id="touch-zone-right">
        <div class="btn" id="btn-click" style="bottom: 3vh; right: 3vw; width: 95px; height: 95px; border-color: #ff4444; font-size: 15px; background: rgba(80,30,30,0.6);">USE<br>Click</div>
        
        <div class="btn" id="btn-f" style="bottom: 15vh; right: 4vw; width: 60px; height: 60px; font-size: 13px;">交流<br>F</div>
        <div class="btn" id="btn-v" style="bottom: 3vh; right: 17vw; width: 60px; height: 60px; font-size: 13px;">話す<br>V</div>

        <div class="btn" id="btn-q" style="bottom: 24vh; right: 14vw; width: 55px; height: 55px; font-size: 12px;">←L<br>Q</div>
        <div class="btn" id="btn-e" style="bottom: 19vh; right: 23vw; width: 55px; height: 55px; font-size: 12px;">R→<br>E</div>
        
        <div class="btn" id="btn-c" style="bottom: 10vh; right: 25vw; width: 55px; height: 55px; font-size: 12px;">証拠<br>C</div>
        
        <div class="btn" id="btn-enter" style="top: 2vh; right: 2vw; width: 48px; height: 48px; border-radius: 8px;">Chat</div>
        <div class="btn" id="btn-i" style="top: 2vh; right: 11vw; width: 48px; height: 48px; border-radius: 8px;">Inv</div>
        <div class="btn" id="btn-tab" style="top: 2vh; right: 20vw; width: 48px; height: 48px; border-radius: 8px;">Tab</div>
    </div>

    <div class="slot-container">
        <button class="slot-btn" id="btn-1">1</button>
        <button class="slot-btn" id="btn-2">2</button>
        <button class="slot-btn" id="btn-3">3</button>
    </div>

    <div id="custom-keyboard-overlay">
        <div id="kb-input-line">
            <div id="kb-preview"></div>
            <button class="sys-btn" style="border-color:#ff4444; color:#ff4444;" onclick="closeKeyboard(false)">CANCEL</button>
            <button class="sys-btn" onclick="closeKeyboard(true)">SEND</button>
        </div>
        <div class="kb-grid" id="kb-grid-container">
            </div>
    </div>
</div>

<script>
    const logEl = document.getElementById('overlay-log');
    let isEditMode = false;
    let isVKeeping = false;
    let lastCtrlTap = 0;

    const keyMap = {
        'btn-shift': 'LeftShift', 'btn-ctrl': 'LeftControl', 'btn-q': 'Q', 'btn-e': 'E',
        'btn-f': 'F', 'btn-click': 'MouseLeft', 'btn-v': 'V', 'btn-tab': 'Tab',
        'btn-i': 'I', 'btn-c': 'C', 'btn-1': '1', 'btn-2': '2', 'btn-3': '3'
    };

    // ズーム防止
    document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

    function sendInput(key, state) {
        logEl.innerText = `[INPUT] ${key} -> ${state ? 'DOWN' : 'UP'}`;
    }

    // Ctrl連続2回でVキーをトグル固定
    const ctrlBtn = document.getElementById('btn-ctrl');
    ctrlBtn.addEventListener('touchstart', (e) => {
        e.preventDefault(); if (isEditMode) return;
        const now = Date.now();
        if (now - lastCtrlTap < 300) {
            isVKeeping = !isVKeeping;
            const vBtn = document.getElementById('btn-v');
            if (isVKeeping) {
                vBtn.classList.add('keep-active'); sendInput('V', true);
            } else {
                vBtn.classList.remove('keep-active'); sendInput('V', false);
            }
            lastCtrlTap = 0; return;
        }
        lastCtrlTap = now;
        ctrlBtn.classList.add('active-press'); sendInput('LeftControl', true);
    });
    ctrlBtn.addEventListener('touchend', (e) => { e.preventDefault(); ctrlBtn.classList.remove('active-press'); sendInput('LeftControl', false); });

    // 移動ジョイスティック
    const joystick = nipplejs.create({
        zone: document.getElementById('touch-zone-left'),
        mode: 'dynamic', position: { left: '20%', top: '75%' },
        color: 'rgba(255, 255, 255, 0.5)', size: 110
    });

    // FPSドラッグ視点移動（右エリアのボタン以外をドラッグ）
    const rightZone = document.getElementById('touch-zone-right');
    let isDragging = false, lastX = 0, lastY = 0;
    rightZone.addEventListener('touchstart', (e) => {
        if (isEditMode || e.target.classList.contains('btn') || e.target.classList.contains('slot-btn')) return;
        isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    }, { passive: true });
    rightZone.addEventListener('touchmove', (e) => {
        if (!isDragging || isEditMode) return;
        logEl.innerText = `[LOOK] X: ${e.touches[0].clientX - lastX}, Y: ${e.touches[0].clientY - lastY}`;
        lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    }, { passive: true });
    rightZone.addEventListener('touchend', () => isDragging = false);

    // 通常のボタンタッチ処理
    document.querySelectorAll('.btn, .slot-btn').forEach(btn => {
        if (btn.id === 'btn-ctrl' || btn.id === 'btn-enter') return;
        btn.addEventListener('touchstart', (e) => {
            if (isEditMode) return; e.preventDefault();
            if (btn.id === 'btn-v' && isVKeeping) return;
            btn.classList.add('active-press'); sendInput(keyMap[btn.id], true);
        });
        btn.addEventListener('touchend', (e) => {
            if (isEditMode) return; e.preventDefault();
            if (btn.id === 'btn-v' && isVKeeping) { isVKeeping = false; btn.classList.remove('keep-active'); sendInput('V', false); return; }
            btn.classList.remove('active-press'); sendInput(keyMap[btn.id], false);
        });
    });

    // --- 超快適ガラケー風トグル（連続タップで文字送り）キーボードエンジン ---
    const kbOverlay = document.getElementById('custom-keyboard-overlay');
    const kbPreview = document.getElementById('kb-preview');
    const gridContainer = document.getElementById('kb-grid-container');
    let currentLang = 'JA';
    let chatText = "";
    let lastKey = null, lastKeyTime = 0, toggleIndex = 0;

    // ガラケー式マッピング（連続で押すと「あ→い→う→え→お」と変わる）
    const toggleLayout = {
        JA: [
            { label: "あ", chars: ["あ","い","う","え","お"] }, { label: "か", chars: ["か","き","く","け","こ"] }, { label: "さ", chars: ["さ","し","す","せ","そ"] }, { label: "戻る", action: "back" },
            { label: "た", chars: ["た","ち","つ","て","と"] }, { label: "な", chars: ["な","に","ぬ","ね","の"] }, { label: "は", chars: ["は","ひ","ふ","へ","ほ"] }, { label: "切替", action: "lang" },
            { label: "ま", chars: ["ま","み","む","め","も"] }, { label: "や", chars: ["や","ゆ","よ"] },         { label: "ら", chars: ["ら","り","る","れ","ろ"] }, { label: "空白", action: "space" },
            { label: "わ", chars: ["わ","を","ん","ー"] },     { label: "゛゜", chars: ["゛","゜"] },       { label: "、。", chars: ["、","。","？","！"] }
        ],
        EN: [
            { label: "ABC", chars: ["A","B","C"] }, { label: "DEF", chars: ["D","E","F"] }, { label: "GHI", chars: ["G","H","I"] }, { label: "戻る", action: "back" },
            { label: "JKL", chars: ["J","K","L"] }, { label: "MNO", chars: ["M","N","O"] }, { label: "PQRS", chars: ["P","Q","R","S"] }, { label: "切替", action: "lang" },
            { label: "TUV", chars: ["T","U","V"] }, { label: "WXYZ", chars: ["W","X","Y","Z"] }, { label: "記号", chars: [".",",","?","!"] }, { label: "空白", action: "space" }
        ]
    };

    document.getElementById('btn-enter').addEventListener('touchstart', (e) => {
        e.preventDefault(); if(isEditMode) return;
        kbOverlay.style.display = 'flex'; chatText = ""; kbPreview.innerText = ""; renderGridKeyboard();
    });

    function renderGridKeyboard() {
        gridContainer.innerHTML = "";
        toggleLayout[currentLang].forEach(keyData => {
            const btn = document.createElement('div');
            btn.className = "kb-key" + (keyData.action ? " sys-key" : "");
            btn.innerText = keyData.label;
            
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const now = Date.now();
                
                if (keyData.action) {
                    if (keyData.action === "back") chatText = chatText.slice(0, -1);
                    else if (keyData.action === "space") chatText += " ";
                    else if (keyData.action === "lang") { currentLang = currentLang === 'JA' ? 'EN' : 'JA'; renderGridKeyboard(); return; }
                    lastKey = null;
                } else {
                    // 同じキーを1秒以内に連続タップした場合は文字を回す
                    if (lastKey === keyData.label && (now - lastKeyTime < 800)) {
                        chatText = chatText.slice(0, -1); // 直前の文字を消して次へ
                        toggleIndex = (toggleIndex + 1) % keyData.chars.length;
                    } else {
                        toggleIndex = 0;
                    }
                    chatText += keyData.chars[toggleIndex];
                    lastKey = keyData.label;
                    lastKeyTime = now;
                }
                kbPreview.innerText = chatText;
            });
            gridContainer.appendChild(btn);
        });
    }

    function closeKeyboard(send) {
        kbOverlay.style.display = 'none';
        if (send && chatText) logEl.innerText = `[CHAT SENT] ${chatText}`;
    }

    // --- レイアウト保存・ドラッグ変更 ---
    function toggleEditMode() {
        isEditMode = !isEditMode;
        const toggleBtn = document.getElementById('mode-toggle');
        const buttons = document.querySelectorAll('.btn');
        if (isEditMode) {
            toggleBtn.innerText = "SAVE"; toggleBtn.style.color = "#ff00ff";
            buttons.forEach(b => b.classList.add('edit-mode'));
        } else {
            toggleBtn.innerText = "EDIT"; toggleBtn.style.color = "#0f0";
            buttons.forEach(b => b.classList.remove('edit-mode'));
            saveLayout();
        }
    }

    document.querySelectorAll('.btn').forEach(btn => {
        btn.addEventListener('touchmove', (e) => {
            if (!isEditMode) return; e.preventDefault();
            const touch = e.touches[0];
            btn.style.left = `${(touch.clientX - btn.offsetWidth/2) / window.innerWidth * 100}vw`;
            btn.style.top = `${(touch.clientY - btn.offsetHeight/2) / window.innerHeight * 100}vh`;
            btn.style.bottom = 'auto'; btn.style.right = 'auto';
        });
    });

    function saveLayout() {
        const layout = {};
        document.querySelectorAll('.btn').forEach(btn => { layout[btn.id] = { left: btn.style.left, top: btn.style.top }; });
        localStorage.setItem('backrooms_layout_v3', JSON.stringify(layout));
    }

    function loadLayout() {
        const saved = localStorage.getItem('backrooms_layout_v3');
        if (!saved) return;
        const layout = JSON.parse(saved);
        Object.keys(layout).forEach(id => {
            const btn = document.getElementById(id);
            if (btn && layout[id].left) {
                btn.style.left = layout[id].left; btn.style.top = layout[id].top;
                btn.style.bottom = 'auto'; btn.style.right = 'auto';
            }
        });
    }
    window.addEventListener('DOMContentLoaded', loadLayout);
</script>
</body>
</html>
