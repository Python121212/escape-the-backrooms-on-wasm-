<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Backrooms Local Launcher</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: #0f0; font-family: monospace; }
        #canvas-container { width: 100%; height: 100%; position: relative; }
        canvas { width: 100%; height: 100%; display: block; }
        #status { position: absolute; top: 10px; left: 10px; font-size: 12px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

<div id="canvas-container">
    <div id="status">LOCAL COMPONENT INITIALIZING...</div>
    <canvas id="gpu-canvas"></canvas>
</div>

<script type="module">
    const statusEl = document.getElementById('status');
    function log(msg) { statusEl.innerText += `\n[AI_SRE] ${msg}`; console.log(msg); }

    async function initLocalEnvironment() {
        // 1. ローカル特権ストレージ (OPFS) の確保
        try {
            log("Accessing OS-protected OPFS storage...");
            const root = await navigator.storage.getDirectory();
            // ここに格納されたゲームデータ（Escape the Backrooms）はOSに勝手に削除されません
            log("OPFS Storage Secured. (No cloud storage dependency).");
        } catch (e) {
            log("ERROR: Failed to secure local storage.");
            return;
        }

        // 2. Turnip(WebGPU) レンダリング層の初期化
        if (!navigator.gpu) {
            log("ERROR: WebGPU not supported. Turnip driver bridge failed.");
            return;
        }

        log("Requesting Tensor G4 High-Performance GPU...");
        const adapter = await navigator.gpu.requestAdapter({ powerPreference: "high-performance" });
        const device = await adapter.requestDevice();
        
        const canvas = document.getElementById('gpu-canvas');
        const context = canvas.getContext('webgpu');
        
        canvas.width = window.innerWidth * (window.devicePixelRatio || 1);
        canvas.height = window.innerHeight * (window.devicePixelRatio || 1);
        
        context.configure({
            device: device,
            format: navigator.gpu.getPreferredCanvasFormat(),
            alphaMode: 'opaque'
        });

        log("Local GPU Pipeline Link: READY.");
        log("Ready to execute Box64 container on local assets.");
    }

    window.addEventListener('DOMContentLoaded', initLocalEnvironment);
</script>
</body>
</html>
