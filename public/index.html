<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Backrooms Container Launcher</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #canvas-container { width: 100%; height: 100%; position: relative; }
        canvas { width: 100%; height: 100%; display: block; }
        #status { position: absolute; top: 10px; left: 10px; color: #0f0; font-family: monospace; font-size: 12px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

<div id="canvas-container">
    <div id="status">INITIATING VULKAN/TURNIP BRIDGE...</div>
    <canvas id="gpu-canvas"></canvas>
</div>

<script type="module">
    // 状態監視ログ
    const statusEl = document.getElementById('status');
    function log(msg) { statusEl.innerText += `\n[AI_SRE] ${msg}`; console.log(msg); }

    async function initGpuBridge() {
        if (!navigator.gpu) {
            log("ERROR: WebGPU (Turnip Backend) not supported on this browser.");
            return;
        }

        log("WebGPU detected. Requesting Tensor G4 Adapter...");
        const adapter = await navigator.gpu.requestAdapter({
            powerPreference: "high-performance" // Tensor G4のBigコア側を要求
        });
        
        const device = await adapter.requestDevice();
        log("GPU Device initialized successfully.");

        const canvas = document.getElementById('gpu-canvas');
        const context = canvas.getContext('webgpu');
        
        // Pixel 9aの画面解像度に合わせてキャンバスを設定
        const devicePixelRatio = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * devicePixelRatio;
        canvas.height = window.innerHeight * devicePixelRatio;
        
        context.configure({
            device: device,
            format: navigator.gpu.getPreferredCanvasFormat(),
            alphaMode: 'opaque'
        });

        log("Vulkan(Turnip) to WebGPU Pipeline Link: READY.");
        log("Ready to receive Box64/Wine runtime injection.");
        
        // ここに将来的にWasm化したBox64のインスタンス化と、
        // OverlayFSでマウントされたゲームの描画ループ（requestAnimationFrame）を接続します
    }

    window.addEventListener('DOMContentLoaded', initGpuBridge);
</script>
</body>
</html>
